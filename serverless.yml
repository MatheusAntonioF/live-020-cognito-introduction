service: live020

package:
  individually: true

provider:
  name: aws
  region: us-east-1
  runtime: nodejs20.x
  deploymentMethod: direct
  architecture: arm64
  environment:
    COGNITO_CLIENT_ID: !Ref Live020UserPoolClient

custom:
  esbuild:
  bundle: true
  minify: true
  sourcemap: false
  target: node20
  exclude:
    - "@aws-sdk/*"
  define:
    require.resolve: undefined
  platform: node
  concurrency: 10

# Recursos necessários para startar a aplicação
# Todo código criado aqui segue a sintaxe do CloudFormation da AWS
resources:
  Resources:
    # Use como referência o template do cloudformation
    Live020UserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        DeletionProtection: INACTIVE
        UserPoolName: Live020UserPool
        MfaConfiguration: OFF
        # Apesar do nome o cognito não vai verificar automaticamente as propriedades
        # só vai possibilitar que o cognito envie o email para o endereço de email por exemplo
        # para aí sim verificar o email
        AutoVerifiedAttributes:
          - email
        AdminCreateUserConfig:
          # Define que os usuários podem se cadastrar por conta própria na plataforma
          # e não precisam de um admin para criar a conta
          AllowAdminCreateUserOnly: false
        # Quais atributos vão ser usados para identificar os usuários
        UsernameAttributes:
          - email
        AccountRecoverySetting:
          RecoveryMechanisms:
            - Name: verified_email
              Priority: 1
        # Politicas de criação de senha
        Policies:
          PasswordPolicy:
            MinimumLength: 10
            RequireLowercase: false
            RequireUppercase: false
            RequireNumbers: false
            RequireSymbols: false
            # Periodo de tempo em que uma senha temporária é válida
            # Isso é útil quando um admin cria uma senha para o primeiro acesso do usuário
            TemporaryPasswordValidityDays: 7
        # Dependendo da configuração, essas propriedades precisam ser enviadas na hora de cadastrar o usuário
        Schema:
          - Name: given_name
            Mutable: true
            Required: true
            AttributeDataType: String
          - Name: family_name
            Mutable: true
            Required: true
            AttributeDataType: String
    Live020UserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: Live020UserPoolClient
        UserPoolId: !Ref Live020UserPool
        ExplicitAuthFlows:
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
        TokenValidityUnits:
          AccessToken: hours
          RefreshToken: hours
        AccessTokenValidity: 3
        RefreshTokenValidity: 1440 # 60 days

functions:
  signUp:
    handler: src/functions/signUp.handler
    events:
      - httpApi:
          method: POST
          path: /auth/sign-up
  signIn:
    handler: src/functions/signIn.handler
    events:
      - httpApi:
          method: POST
          path: /auth/sign-in
  accountConfirmation:
    handler: src/functions/accountConfirmation.handler
    events:
      - httpApi:
          method: POST
          path: /auth/account-confirmation
